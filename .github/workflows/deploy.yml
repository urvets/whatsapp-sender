name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches:
      - main
      - develop

jobs:
  fetch-secrets:
    name: Fetch Infisical Secrets
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'develop' && 'Development' || 'Production' }}
    outputs:
      CLOUDFLARE_ZONE_ID: ${{ steps.export-secrets.outputs.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ steps.export-secrets.outputs.CLOUDFLARE_API_TOKEN }}
      DEPLOY_PATH: ${{ steps.export-secrets.outputs.DEPLOY_PATH }}
      TELEGRAM_BOT_TOKEN: ${{ steps.export-secrets.outputs.TELEGRAM_BOT_TOKEN }}
      SSH_HOST: ${{ steps.export-secrets.outputs.SSH_HOST }}
      SSH_USER: ${{ steps.export-secrets.outputs.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ steps.export-secrets.outputs.SSH_PRIVATE_KEY }}
      SSH_PASSPHRASE: ${{ steps.export-secrets.outputs.SSH_PASSPHRASE }}
      TELEGRAM_CHAT_ID: ${{ steps.export-secrets.outputs.TELEGRAM_CHAT_ID }}
    steps:
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Fetch and Export Secrets
        id: export-secrets
        run: |
          INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id=${{ secrets.INFISICAL_CLIENT_ID }} --client-secret=${{ secrets.INFISICAL_CLIENT_SECRET }} --plain --silent)
          export INFISICAL_TOKEN
          ENV_NAME="${{ github.ref_name == 'develop' && 'dev' || 'prod' }}"
          
          # Export secrets in JSON format to extract keys easily
          infisical export --format=json --env=$ENV_NAME --projectId=${{ secrets.INFISICAL_PROJECT_ID }} --path="/GITHUB" > secrets.json
          
          # Read individual values and set as GITHUB_OUTPUT
          echo "CLOUDFLARE_ZONE_ID=$(node -p "require('./secrets.json').find(x => x.key === 'CLOUDFLARE_ZONE_ID')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "CLOUDFLARE_API_TOKEN=$(node -p "require('./secrets.json').find(x => x.key === 'CLOUDFLARE_API_TOKEN')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_PATH=$(node -p "require('./secrets.json').find(x => x.key === 'DEPLOY_PATH')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "TELEGRAM_BOT_TOKEN=$(node -p "require('./secrets.json').find(x => x.key === 'TELEGRAM_BOT_TOKEN')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "SSH_HOST=$(node -p "require('./secrets.json').find(x => x.key === 'SSH_HOST')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "SSH_USER=$(node -p "require('./secrets.json').find(x => x.key === 'SSH_USER')?.value || ''")" >> "$GITHUB_OUTPUT"
          
          # Multi-line outputs for keys
          echo "SSH_PRIVATE_KEY<<EOF" >> "$GITHUB_OUTPUT"
          node -p "require('./secrets.json').find(x => x.key === 'SSH_PRIVATE_KEY')?.value || ''" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          
          echo "SSH_PASSPHRASE=$(node -p "require('./secrets.json').find(x => x.key === 'SSH_PASSPHRASE')?.value || ''")" >> "$GITHUB_OUTPUT"
          echo "TELEGRAM_CHAT_ID=$(node -p "require('./secrets.json').find(x => x.key === 'TELEGRAM_CHAT_ID')?.value || ''")" >> "$GITHUB_OUTPUT"
        env:
          INFISICAL_API_URL: ${{ secrets.INFISICAL_API_URL || 'https://app.infisical.com' }}

  test-and-build-image:
    name: Test and Build Docker Image
    needs: fetch-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'develop' && 'Development' || 'Production' }}
    env:
      REGISTRY: ghcr.io
      API_IMAGE_NAME: ${{ github.repository_owner }}/whatsapp-sender
      TELEGRAM_BOT_TOKEN: ${{ needs.fetch-secrets.outputs.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ needs.fetch-secrets.outputs.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Telegram start notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=🚀 <b>Workflow Started</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">${{ github.sha }}</a>
            <b>Author:</b> ${{ github.actor }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name == 'develop' && 'latest-dev' || 'latest' }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Build & Test Failed</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-develop:
    name: Deploy to Single Instance (Development)
    needs: [fetch-secrets, test-and-build-image]
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    environment: Development
    env:
      CLOUDFLARE_ZONE_ID: ${{ needs.fetch-secrets.outputs.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ needs.fetch-secrets.outputs.CLOUDFLARE_API_TOKEN }}
      DEPLOY_PATH: ${{ needs.fetch-secrets.outputs.DEPLOY_PATH }}
      TELEGRAM_BOT_TOKEN: ${{ needs.fetch-secrets.outputs.TELEGRAM_BOT_TOKEN }}
      SSH_HOST: ${{ needs.fetch-secrets.outputs.SSH_HOST }}
      SSH_USER: ${{ needs.fetch-secrets.outputs.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ needs.fetch-secrets.outputs.SSH_PRIVATE_KEY }}
      SSH_PASSPHRASE: ${{ needs.fetch-secrets.outputs.SSH_PASSPHRASE }}
      TELEGRAM_CHAT_ID: ${{ needs.fetch-secrets.outputs.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Cloudflared CLI
        run: |
          curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Config and Key
        env:
          SSH_PRIVATE_KEY: ${{ env.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add configuration for proxying SSH through cloudflared
          cat <<EOF >> ~/.ssh/config
          Host ssh-server
            HostName ${{ env.SSH_HOST }}
            User ${{ env.SSH_USER || 'admin' }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Execute Remote Deploy Commands
        run: |
          # Start ssh-agent and add passphrase-protected key
          eval $(ssh-agent -s)
          echo 'echo "${{ env.SSH_PASSPHRASE }}"' > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          ssh ssh-server "${{ env.DEPLOY_PATH || '/opt/urvets' }}/update-whatsapp-gateway.sh"

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Send Telegram success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=✅ <b>Deployment Successful (Single Instance Dev)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Deployment Failed (Dev)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-production:
    name: Deploy to Single Instance (Production)
    needs: [fetch-secrets, test-and-build-image]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: Production
    env:
      CLOUDFLARE_ZONE_ID: ${{ needs.fetch-secrets.outputs.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ needs.fetch-secrets.outputs.CLOUDFLARE_API_TOKEN }}
      DEPLOY_PATH: ${{ needs.fetch-secrets.outputs.DEPLOY_PATH }}
      TELEGRAM_BOT_TOKEN: ${{ needs.fetch-secrets.outputs.TELEGRAM_BOT_TOKEN }}
      SSH_HOST: ${{ needs.fetch-secrets.outputs.SSH_HOST }}
      SSH_USER: ${{ needs.fetch-secrets.outputs.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ needs.fetch-secrets.outputs.SSH_PRIVATE_KEY }}
      SSH_PASSPHRASE: ${{ needs.fetch-secrets.outputs.SSH_PASSPHRASE }}
      TELEGRAM_CHAT_ID: ${{ needs.fetch-secrets.outputs.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Cloudflared CLI
        run: |
          curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Config and Key
        env:
          SSH_PRIVATE_KEY: ${{ env.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add configuration for proxying SSH through cloudflared
          cat <<EOF >> ~/.ssh/config
          Host ssh-server
            HostName ${{ env.SSH_HOST }}
            User ${{ env.SSH_USER || 'admin' }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Execute Remote Deploy Commands
        run: |
          # Start ssh-agent and add passphrase-protected key
          eval $(ssh-agent -s)
          echo 'echo "${{ env.SSH_PASSPHRASE }}"' > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          ssh ssh-server "${{ env.DEPLOY_PATH || '/opt/urvets' }}/update-whatsapp-gateway.sh"

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Send Telegram success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=✅ <b>Deployment Successful (Single Instance Prod)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=${{ env.TELEGRAM_CHAT_ID || '-1003956980090' }}" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Deployment Failed (Prod)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
