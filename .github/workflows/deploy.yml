# Trigger pipeline run
name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches:
      - main
      - develop

jobs:
  test-and-build-image:
    name: Test and Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'develop' && 'Development' || 'Production' }}
    env:
      REGISTRY: ghcr.io
      WA_IMAGE_NAME: ${{ github.repository_owner }}/whatsapp-sender

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Telegram start notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=🚀 <b>Workflow Started</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">${{ github.sha }}</a>
            <b>Author:</b> ${{ github.actor }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WhatsApp Sender Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WA_IMAGE_NAME }}:${{ github.ref_name == 'develop' && 'latest-dev' || 'latest' }}
            ${{ env.REGISTRY }}/${{ env.WA_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Build & Test Failed</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-develop:
    name: Deploy to Single Instance (Development)
    needs: test-and-build-image
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Cloudflared CLI
        run: |
          curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Config and Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add configuration for proxying SSH through cloudflared
          cat <<EOF >> ~/.ssh/config
          Host ssh-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER || 'admin' }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Execute Remote Deploy Commands
        run: |
          # Start ssh-agent and add passphrase-protected key
          eval $(ssh-agent -s)
          echo 'echo "${{ secrets.SSH_PASSPHRASE }}"' > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          ssh ssh-server "${{ secrets.DEPLOY_PATH || '/opt/urvets' }}/update-whatsapp-gateway.sh"

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Send Telegram success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=✅ <b>Deployment Successful (Single Instance Dev)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Deployment Failed (Dev)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-production:
    name: Deploy to Single Instance (Production)
    needs: test-and-build-image
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Cloudflared CLI
        run: |
          curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Config and Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add configuration for proxying SSH through cloudflared
          cat <<EOF >> ~/.ssh/config
          Host ssh-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER || 'admin' }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Execute Remote Deploy Commands
        run: |
          # Start ssh-agent and add passphrase-protected key
          eval $(ssh-agent -s)
          echo 'echo "${{ secrets.SSH_PASSPHRASE }}"' > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          ssh ssh-server "${{ secrets.DEPLOY_PATH || '/opt/urvets' }}/update-whatsapp-gateway.sh"

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Send Telegram success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=✅ <b>Deployment Successful (Single Instance Prod)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN || '8954996588:AAHim2OwZ55W2DjNRuJnTvyLd2PgwO6KKoU' }}/sendMessage" \
            -d "chat_id=-1003956980090" \
            -d "message_thread_id=2" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Deployment Failed (Prod)</b>
            <b>Repo:</b> ${{ github.repository }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Run URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"