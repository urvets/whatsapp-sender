services:
  whatsapp-sender:
    build: .
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
      - "${FRONTEND_PORT:-3001}:${FRONTEND_PORT:-3001}"
    env_file:
      - .env
    volumes:
      - ./auth_info:/app/auth_info
      - ./.env:/app/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
